<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background square with rounded corners -->
  <rect width="512" height="512" rx="112" fill="#027381"/>
  <!-- Clock face -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="white" stroke-width="24"/>
  <!-- Hour hand (pointing to 12) -->
  <line x1="256" y1="256" x2="256" y2="128" stroke="white" stroke-width="22" stroke-linecap="round"/>
  <!-- Minute hand (pointing to 3) -->
  <line x1="256" y1="256" x2="364" y2="256" stroke="white" stroke-width="18" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="12" fill="white"/>
</svg>
